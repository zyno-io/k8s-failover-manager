# This rule is not used by the project k8s-failover-manager itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over k8s-failover.zyno.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: k8s-failover-manager
    app.kubernetes.io/managed-by: kustomize
  name: failoverservice-admin-role
rules:
- apiGroups:
  - k8s-failover.zyno.io
  resources:
  - failoverservices
  verbs:
  - '*'
- apiGroups:
  - k8s-failover.zyno.io
  resources:
  - failoverservices/status
  verbs:
  - get
