---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - get
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
# NOTE: The Helm chart scopes this rule with resourceNames to the specific
# remote kubeconfig Secret. When using kustomize, consider adding resourceNames
# manually to restrict access.
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - get
- apiGroups:
  - apps
  resources:
  - deployments/scale
  - statefulsets/scale
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - discovery.k8s.io
  resources:
  - endpointslices
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - k8s-failover.zyno.io
  resources:
  - failoverevents
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - k8s-failover.zyno.io
  resources:
  - failoverevents/status
  - failoverservices/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - k8s-failover.zyno.io
  resources:
  - failoverservices
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - k8s-failover.zyno.io
  resources:
  - failoverservices/finalizers
  verbs:
  - update
