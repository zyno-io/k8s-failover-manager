# This rule is not used by the project k8s-failover-manager itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the k8s-failover.zyno.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.
#
# SECURITY NOTE:
# Granting write access to FailoverService is effectively privileged in this project because
# FailoverService specs can run transition actions (HTTP calls, Jobs, scaling operations).

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: k8s-failover-manager
    app.kubernetes.io/managed-by: kustomize
  name: failoverservice-editor-role
rules:
- apiGroups:
  - k8s-failover.zyno.io
  resources:
  - failoverservices
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - k8s-failover.zyno.io
  resources:
  - failoverservices/status
  verbs:
  - get
