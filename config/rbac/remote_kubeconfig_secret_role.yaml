# Read access to the remote kubeconfig Secret is intentionally namespaced.
# If you change the controller namespace from "system" or store the Secret in
# another namespace, create an equivalent Role/RoleBinding in that namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/name: k8s-failover-manager
    app.kubernetes.io/managed-by: kustomize
  name: remote-kubeconfig-secret-role
  namespace: system
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
