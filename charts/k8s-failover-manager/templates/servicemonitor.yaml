{{- if and .Values.serviceMonitor.enabled .Values.metrics.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "k8s-failover-manager.fullname" . }}-metrics-monitor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-failover-manager.labels" . | nindent 4 }}
    control-plane: controller-manager
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  endpoints:
    - path: /metrics
      port: https
      scheme: https
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        insecureSkipVerify: {{ .Values.serviceMonitor.tlsConfig.insecureSkipVerify }}
        {{- if .Values.serviceMonitor.tlsConfig.caFile }}
        caFile: {{ .Values.serviceMonitor.tlsConfig.caFile | quote }}
        {{- end }}
        {{- if .Values.serviceMonitor.tlsConfig.serverName }}
        serverName: {{ .Values.serviceMonitor.tlsConfig.serverName | quote }}
        {{- end }}
  selector:
    matchLabels:
      {{- include "k8s-failover-manager.selectorLabels" . | nindent 6 }}
      control-plane: controller-manager
{{- end }}
