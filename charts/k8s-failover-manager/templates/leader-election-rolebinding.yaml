apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "k8s-failover-manager.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-failover-manager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "k8s-failover-manager.fullname" . }}-leader-election-role
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-failover-manager.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
