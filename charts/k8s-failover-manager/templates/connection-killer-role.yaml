{{- if .Values.connectionKiller.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "k8s-failover-manager.fullname" . }}-connection-killer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-failover-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: connection-killer
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    resourceNames:
      - connection-kill-signal
    verbs:
      - get
      - update
      - patch
      - watch
      - list
{{- end }}
