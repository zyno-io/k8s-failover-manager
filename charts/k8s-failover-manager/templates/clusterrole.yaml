apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-failover-manager.fullname" . }}-manager-role
  labels:
    {{- include "k8s-failover-manager.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - create
      - get
      - patch
      - update
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
    verbs:
      - get
  - apiGroups:
      - apps
    resources:
      - deployments/scale
      - statefulsets/scale
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - delete
      - get
      - list
      - watch
  - apiGroups:
      - discovery.k8s.io
    resources:
      - endpointslices
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - k8s-failover.zyno.io
    resources:
      - failoverservices
    verbs:
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - k8s-failover.zyno.io
    resources:
      - failoverservices/finalizers
    verbs:
      - update
  - apiGroups:
      - k8s-failover.zyno.io
    resources:
      - failoverservices/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - k8s-failover.zyno.io
    resources:
      - failoverevents
    verbs:
      - create
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - k8s-failover.zyno.io
    resources:
      - failoverevents/status
    verbs:
      - get
      - patch
      - update
