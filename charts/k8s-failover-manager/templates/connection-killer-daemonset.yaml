{{- if .Values.connectionKiller.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "k8s-failover-manager.fullname" . }}-connection-killer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-failover-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: connection-killer
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: connection-killer
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: connection-killer
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      hostPID: true
      serviceAccountName: {{ include "k8s-failover-manager.connectionKillerServiceAccountName" . }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: connection-killer
          image: "{{ .Values.connectionKiller.image.repository }}{{ if .Values.connectionKiller.image.digest }}@{{ .Values.connectionKiller.image.digest }}{{ else }}:{{ .Values.connectionKiller.image.tag }}{{ end }}"
          imagePullPolicy: {{ .Values.connectionKiller.image.pullPolicy }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CONTROLLER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_ADMIN
                - SYS_ADMIN
          resources:
            {{- toYaml .Values.connectionKiller.resources | nindent 12 }}
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - operator: Exists
{{- end }}
