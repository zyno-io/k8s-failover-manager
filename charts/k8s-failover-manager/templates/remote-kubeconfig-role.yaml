apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "k8s-failover-manager.fullname" . }}-remote-kubeconfig
  namespace: {{ .Values.failoverConfig.remoteKubeconfigNamespace }}
  labels:
    {{- include "k8s-failover-manager.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - {{ .Values.failoverConfig.remoteKubeconfigSecret | quote }}
    verbs:
      - get
