apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-failover-manager.fullname" . }}-controller-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-failover-manager.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "k8s-failover-manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        {{- include "k8s-failover-manager.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: {{ include "k8s-failover-manager.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /manager
          args:
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            - --health-probe-bind-address=:8081
            {{- if .Values.metrics.enabled }}
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            {{- end }}
          env:
            - name: CLUSTER_ROLE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "k8s-failover-manager.fullname" . }}-config
                  key: cluster-role
            - name: CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ include "k8s-failover-manager.fullname" . }}-config
                  key: cluster-id
            - name: REMOTE_KUBECONFIG_SECRET
              valueFrom:
                configMapKeyRef:
                  name: {{ include "k8s-failover-manager.fullname" . }}-config
                  key: remote-kubeconfig-secret
            - name: REMOTE_KUBECONFIG_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "k8s-failover-manager.fullname" . }}-config
                  key: remote-kubeconfig-namespace
            - name: CONTROLLER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
